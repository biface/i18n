[tox]
minversion = 4.0
envlist =
    py310, py311, py312, py313, py314,
    integration,
    basedpyright, flake8, black-check, isort-check, bandit,
    black, isort, format,
    ci-quality, coverage,
    pre-push, local
requires = tox-uv
toxworkdir = {toxinidir}/.tox

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

# =============================================================================
# UNIT TESTS — per Python version
# CI job: test-unit
# Excludes network and timeout-marked tests (mocked, no external calls)
# =============================================================================

[testenv]
uv_seed = true
setenv =
    PYTHONPATH = {toxinidir}/src:{toxinidir}/tests
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib \
        -m "not network and not timeout" \
        --cov=i18n_tools --cov-report=term-missing tests

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

# =============================================================================
# INTEGRATION TESTS — real network calls (httpbingo.org)
# CI job: test-integration
# Runs only on version tags and scheduled pipelines (see python-ci.yaml)
# =============================================================================

[testenv:integration]
description = Integration tests requiring real network access
basepython = python3.12
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib \
        -m "network and not timeout" tests

# =============================================================================
# COVERAGE — full suite (unit + integration), tag-only in CI
# CI job: coverage
# B202: tarfile traversal controlled via _non_traversal_path() in loaders.py
# =============================================================================

[testenv:coverage]
description = Generate coverage report (full suite, excludes only timeout)
basepython = python3.12
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib \
        -m "not timeout" \
        --cov=i18n_tools \
        --cov-append \
        --cov-report=term-missing \
        --cov-report=xml:{toxinidir}/coverage/coverage.xml \
        --cov-report=html:{toxinidir}/coverage/coverage_html tests

# =============================================================================
# INDIVIDUAL QUALITY TOOLS
# =============================================================================

[testenv:basedpyright]
description = Static type checking with basedpyright
deps =
    -r {toxinidir}/.tox-config/requirements/type-check.txt
allowlist_externals = bash
commands =
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"

[testenv:flake8]
description = Lint the code with flake8
deps =
    -r {toxinidir}/.tox-config/requirements/linter.txt
commands =
    flake8 src tests

[testenv:black-check]
description = Check code formatting with black (no changes)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --check --diff --target-version py310 src tests

[testenv:isort-check]
description = Check import sorting with isort (no changes)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    isort --check-only --diff src tests

[testenv:bandit]
description = Security analysis with bandit
# B202: tarfile traversal controlled via _non_traversal_path() in loaders.py
deps =
    -r {toxinidir}/.tox-config/requirements/security.txt
commands =
    bandit -r src -s B202

# =============================================================================
# AUTO-FIX TOOLS
# =============================================================================

[testenv:black]
description = Auto-format code with black
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --target-version py310 src tests

[testenv:isort]
description = Auto-sort imports with isort
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    isort src tests

[testenv:format]
description = Auto-format code (black then isort)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --target-version py310 src tests
    isort src tests

# =============================================================================
# CI QUALITY GATE
# CI job: quality — verify only, no auto-fix
# =============================================================================

[testenv:ci-quality]
description = All quality checks chained (used by the CI quality job)
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals = bash
commands =
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"
    flake8 src tests
    black --check --diff --target-version py310 src tests
    isort --check-only --diff src tests
    bandit -r src -s B202

# =============================================================================
# LOCAL WORKFLOWS
# =============================================================================

[testenv:pre-push]
description = Quality gate + unit tests before pushing
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals =
    bash
passenv =
    HOME
    USER
commands =
    # 1. Auto-formatting
    black --target-version py310 src tests
    isort src tests

    # 2. Type checking
    #bash -c "basedpyright src; code=$?; [ $code -le 1 ]"

    # 3. Linting
    #flake8 src tests

    # 4. Security
    # B202: tarfile traversal controlled via _non_traversal_path() in loaders.py
    bandit -r src -s B202

    # 5. Unit tests — sequential multi-version
    bash {toxinidir}/.tox-config/scripts/test.sh

    # 6. Coverage (py312)
    bash {toxinidir}/.tox-config/scripts/coverage.sh

[testenv:local]
description = Full local workflow: auto-fix, all quality checks, full coverage
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals =
    bash
passenv =
    HOME
    USER
commands =
    # 1. Auto-formatting
    black --target-version py310 src tests
    isort src tests

    # 2. Type checking
    #bash -c "basedpyright src; code=$?; [ $code -le 1 ]"

    # 3. Linting
    #flake8 src tests

    # 4. Security
    # B202: tarfile traversal controlled via _non_traversal_path() in loaders.py
    bandit -r src -s B202

    # 5. Full coverage (unit + integration, excludes only timeout)
    pytest --import-mode=importlib \
        -m "not timeout" \
        --cov=i18n_tools \
        --cov-report=term-missing \
        --cov-report=xml:{toxinidir}/coverage/coverage.xml \
        --cov-report=html:{toxinidir}/coverage/coverage_html tests

# =============================================================================
# TOOL CONFIGURATION
# =============================================================================

[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501
exclude =
    .tox,
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg
per-file-ignores =
    tests/*:F401,F841,E711,E712,E731,F811,F541

[isort]
profile = black
line_length = 88
known_first_party = i18n_tools
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
