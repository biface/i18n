name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  check:
    name: Run checks on multiple Python versions
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox

    - name: Print Python version
      run: python --version

    - name: Print installed packages
      run: pip list

    - name: Create coverage directory
      run: mkdir -p coverage

    - name: Run gh-ci-check environment with tox
      run: tox -e gh-ci

    - name: Show pytest cache content
      if: always()
      run: |
        if [ -d tests/.pytest_cache ]; then
          echo "pytest cache directory exists"
          ls -R tests/.pytest_cache
        else
          echo "pytest cache directory does not exist"
        fi

    - name: Show coverage.xml content
      if: always()
      run: cat coverage/coverage.xml

    - name: Show pytest last failed results
      if: always()
      run: |
        if [ -f tests/.pytest_cache/v/cache/lastfailed ]; then
          cat tests/.pytest_cache/v/cache/lastfailed
        else
          echo "No last failed tests recorded"
        fi