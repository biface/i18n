name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  check:
    name: Run checks on multiple Python versions
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox

    - name: Print Python version
      run: python --version

    - name: Print installed packages
      run: pip list

    - name: Create coverage directory
      run: mkdir -p coverage

    - name: Run gh-ci-check environment with tox
      run: tox -e gh-ci

    - name: Show pytest results
      if: always()
      run: cat .tox/gh-ci/log/gh-ci-0.log

    - name: Show coverage.xml content
      if: always()
      run: cat coverage/coverage.xml