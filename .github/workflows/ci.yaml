name: CI

on:
  push:
    branches:
      - '**'  # Déclencher le job sur chaque push, indépendamment de la branche
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Utilisation de la version v3 de actions/checkout

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4  # Utilisation de la version v4 de actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run linters and tests with tox
        run: tox -e ci