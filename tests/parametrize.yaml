# ---------------------------------------------------------------------------
# parametrize.yaml — centralised test data for i18n-tools test suite
#
# Sections:
#   configuration     — relative paths to mock directories (used by copy_and_update_repository)
#   repository        — relative path fragments injected into tmp config files
#   repository-content — kwargs passed to Repository() in tmp_class_repository
#   files             — config file names used by tmp_repository
#   setup             — structure used by tmp_repository (languages, domains, modules)
# ---------------------------------------------------------------------------

# Relative paths from tests/ root to mock source directories.
# Used by copy_and_update_repository() to locate sources for shutil.copytree().
configuration:
  root: "mock"
  application: "mock/application"
  package: "mock/package"
  config: "_i18n_tools"
  backup: "backup"
  locale: "locales"
  messages: "LC_MESSAGES"
  template: "templates"

# Relative path fragments used by update_tmp_repository() to locate and rewrite
# the i18n-tools.yaml config file inside the tmp copy. All values are relative
# to tmp_path so they work on any machine.
repository:
  application:
    root: "repository-test"
    repository: "repository-test"
    config: "repository-test/fsm_tools/locales/_i18n_tools"
    settings: "i18n-tools.yaml"
    failed: "failed-i18n-tools.yaml"
  package:
    root: "package-configuration"
    repository: "package-configuration"
    config: "package-configuration/i18n_tools/locales/_i18n_tools"
    settings: "i18n-tools.yaml"
  other: "test-function"
  locale: "locales"
  configuration:
    valid: "valid-i18n-tools.yaml"
    error: "error-i18n-tools.yaml"

# Reference data passed as **kwargs to Repository() by tmp_class_repository.
# paths.*  are always overwritten at runtime — values below are intentional
# placeholders (empty strings). Only modules is preserved as-is.
repository-content:
  authors:
    7d097ac4-ba77-4333-a63f-76d48a75b38c:
      email: john@doe.com
      first_name: John
      languages:
        - fr
        - en
      last_name: Doe
      url: ''
    baf52b25-d1ed-4651-a3e6-273850901cf0:
      email: jeanne@doe.com
      first_name: Jeanne
      languages:
        - fr
        - en
      last_name: Doe
      url: ''
  domains:
    fsm_tools:
      - usage
      - model
    fsm_tools/lba:
      - information
      - error
    fsm_tools/turing:
      - information
      - error
    django-fsm_tools:
      - usage
      - information
      - error
    django-fsm_tools/context:
      - usage
      - error
      - output
  languages:
    fallback: en
    hierarchy:
      en:
        - en-US
        - en-GB
      fr:
        - fr-FR
    source: en
  paths:
    # Injected at runtime by tmp_class_repository — never read from this file
    root: ""
    repository: ""
    config: ""
    backup: ""
    settings: i18n-tools.yaml
    modules:
      - fsm_tools
      - fsm_tools/turing
      - fsm_tools/lba
      - django-fsm_tools
      - django-fsm_tools/context
  translators:
    GoogleTranslate:
      details:
        name: GoogleTranslate
        status: free
        url: https://translate.google.com
      pricing:
        cost_per_translation: null
        payment_plan: null
      technical:
        api:
          key: your_api_key
          key_expiration: '2025-12-31'
          request_limit: 10000
        performance:
          max_text_size: 5000
          priority: 1
          success_rate: 99.5
  details:
    description: This project is a study of implementation of Chomsky's formal language
      and usage of finite state machine
    name: fsm-tools
    summary: A toolbox for Chomsky's formal language hierarchy
    version: 0.0.1
    date:
      created: 2024-08-16 14:00
      updated: 2025-09-14 14:54

# Config file names written into tmp directories by tmp_repository.
files:
  yaml: "config.yaml"
  toml: "config.toml"
  err_yaml: "config_err.yaml"

# Structure used by tmp_repository to build a minimal application layout.
setup:
  paths:
    application:
      base: 'repository'
      modules:
        - mod1/
        - mod2/pkg1/
        - mod2/pkg2/
  languages:
    source: en
    hierarchy:
      fr: ["fr-FR", "fr-BE", "fr-CA"]
      en: ["en-IE", "en-US", "en-GB"]
    fallback: fr
  domains:
    package:
      "i18n_tools":
        - "domain1"
    application:
      "mod1":
        - "domain2"
        - "domain3"
      "mod2/pkg1/":
        - "domain4"
        - "domain5"
      "mod2/pkg2/":
        - "domain6"
        - "domain7"
