configuration:
  root: "mock"
  application: "mock/application"
  package: "mock/package"
  config: "_i18n_tools"
  backup: "backup"
  locale: "locales"
  messages: "LC_MESSAGES"
  template: "templates"
repository:
  application:
    root: "repository-test"
    repository: "repository-test"
    config: "repository-test/fsm_tools/locales/_i18n_tools"
    settings: "i18n-tools.yaml"
  package:
    root: "package-configuration"
    repository: "package-configuration"
    config: "package-configuration/i18n_tools/locales/_i18n_tools"
    settings: "i18n-tools.yaml"
  other : "test-function"
  locale: "locales"
  configuration:
    valid: "valid-i18n-tools.yaml"
    error: "error-i18n-tools.yaml"
catalog:
  "fsm_tools":
    project: "fsm-tools"
    locale: ["fr", "en", "en-US", "fr-FR"]
    domain: ["usage", "model"]
  "fsm_tools/turing":
    project: "fsm_tools"
    locale: ["fr", "en", "en-GB", "fr-FR"]
    domain: ["information", "error"]
  "fsm_tools/lba":
    project: "fsm_tools"
    locale: [ "fr", "en", "en-US", "en-GB", "fr-FR" ]
    domain: [ "information", "error"]
  "django-fsm_tools":
    project: "fsm_tools"
    locale: [ "fr", "en", "en-GB", "fr-FR" ]
    domain: [ "usage", "information", "error"]
config:
  yaml: "config/yaml"
  toml: "config/toml"
  json: "config/json"
files:
  yaml: "config.yaml"
  toml: "config.toml"
  err_yaml: "config_err.yaml"
setup:
  paths:
    application:
      base: 'repository'
      modules:
        - mod1/
        - mod2/pkg1/
        - mod2/pkg2/
  languages:
    source: en
    hierarchy:
      fr: ["fr-FR", "fr-BE", "fr-CA"]
      en: ["en-IE", "en-US", "en-GB"]
    fallback: fr
  domains:
    package:
      "i18n_tools":
        - "domain1"
    application:
      "mod1":
        - "domain2"
        - "domain3"
      "mod2/pkg1/":
        - "domain4"
        - "domain5"
      "mod2/pkg2/":
        - "domain6"
        - "domain7"
