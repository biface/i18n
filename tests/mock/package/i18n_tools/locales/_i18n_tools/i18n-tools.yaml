configuration: package
package:
  authors:
    51e7a015-d78e-4bdc-abb9-6ce43e8ce2c4:
      email: mike.l.fakeuphead@gmail.com
      first_name: "Michaël"
      languages: [ "en", "fr", "fr-FR" ]
      last_name: "Fecq-Heupe Hède"
      url: ''
  domains:
    "i18n_tools":
      - api
      - config
      - sync
    "i18n_tools/loaders":
      - utils
      - repository
      - handler
      - config
  languages:
    fallback: 'en'
    hierarchy:
      en:
        - en-US
        - en-GB
      fr:
        - fr-FR
    source: 'fr-FR'
  paths:
    # Overwritten at runtime by update_tmp_repository() — never used as-is
    config: ""
    backup: ""
    repository: ""
    root: ""
    settings: i18n-tools.yaml
    modules:
      - i18n_tools
      - i18n_tools/loaders
  translators: { }
  details:
    description: 'This package is build to implement extensive usage of translations and being compatible with i18n and i18next format'
    name: 'i18n-tools'
    summary: 'Implementation of extensive tools form i18n translations'
